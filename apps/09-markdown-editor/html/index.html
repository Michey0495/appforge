<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdownライブプレビュー</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-style">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ダークモード */
  body.dark {
    background: #1a1a2e;
    color: #e5e7eb;
  }
  body.dark .header { border-bottom-color: #2d2d44; }
  body.dark .toolbar { border-bottom-color: #2d2d44; }
  body.dark .editor-pane { background: #1a1a2e; color: #e5e7eb; border-right-color: #2d2d44; }
  body.dark .editor-pane textarea { background: #1a1a2e; color: #e5e7eb; border-color: #2d2d44; }
  body.dark .preview-pane { background: #22223a; color: #e5e7eb; }
  body.dark .preview-pane h1,
  body.dark .preview-pane h2,
  body.dark .preview-pane h3 { color: #e5e7eb; }
  body.dark .preview-content code { background: #2d2d44; color: #e5e7eb; }
  body.dark .preview-content pre { background: #2d2d44; }
  body.dark .preview-content blockquote { border-left-color: #3d3d5c; color: #9ca3af; }
  body.dark .preview-content a { color: #6b8fd4; }
  body.dark .preview-content table th { background: #2d2d44; }
  body.dark .preview-content table td,
  body.dark .preview-content table th { border-color: #3d3d5c; }
  body.dark .footer { background: #22223a; border-top-color: #2d2d44; color: #9ca3af; }
  body.dark .toolbar-btn { color: #9ca3af; border-color: #2d2d44; }
  body.dark .toolbar-btn:hover { background: #2d2d44; color: #e5e7eb; }
  body.dark .btn { background: #2e4f87; }
  body.dark .btn-outline { color: #9ca3af; border-color: #2d2d44; }
  body.dark .btn-outline:hover { background: #2d2d44; }
  body.dark .pane-label { background: #22223a; border-bottom-color: #2d2d44; color: #6b7280; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid #f3f4f6;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-subtitle { font-size: 11px; color: #9ca3af; }
  .header-actions { display: flex; gap: 8px; }

  label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
  }

  .btn {
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #2e4f87; }

  .btn-outline {
    background: transparent;
    color: #1e3461;
    border: 1px solid #e5e7eb;
  }
  .btn-outline:hover { background: #f3f4f6; }

  .toolbar {
    display: flex;
    gap: 4px;
    padding: 8px 24px;
    border-bottom: 1px solid #f3f4f6;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar-btn {
    padding: 4px 10px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    cursor: pointer;
    color: #6b7280;
    transition: background 0.15s, color 0.15s;
  }
  .toolbar-btn:hover { background: #f3f4f6; color: #1a1a2e; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .pane-label {
    padding: 6px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    background: #fafafa;
    border-bottom: 1px solid #f3f4f6;
  }

  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #f3f4f6;
    min-width: 0;
  }
  .editor-pane textarea {
    flex: 1;
    width: 100%;
    border: none;
    padding: 16px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    line-height: 1.7;
    resize: none;
    outline: none;
    color: #1a1a2e;
    background: #ffffff;
  }

  .preview-pane {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .preview-content {
    flex: 1;
  }

  .preview-content h1 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; color: #1a1a2e; }
  .preview-content h2 { font-size: 16px; font-weight: 600; margin: 20px 0 10px; color: #1a1a2e; border-bottom: 1px solid #f3f4f6; padding-bottom: 6px; }
  .preview-content h3 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: #1a1a2e; }
  .preview-content p { margin: 8px 0; line-height: 1.8; }
  .preview-content ul, .preview-content ol { margin: 8px 0; padding-left: 24px; }
  .preview-content li { margin: 4px 0; line-height: 1.7; }
  .preview-content code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
  }
  .preview-content pre {
    background: #f3f4f6;
    padding: 12px 16px;
    border-radius: 2px;
    overflow-x: auto;
    margin: 12px 0;
  }
  .preview-content pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.6;
  }
  .preview-content blockquote {
    border-left: 3px solid #e5e7eb;
    padding-left: 16px;
    margin: 12px 0;
    color: #6b7280;
  }
  .preview-content a { color: #1e3461; text-decoration: underline; }
  .preview-content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
  .preview-content table th,
  .preview-content table td {
    border: 1px solid #e5e7eb;
    padding: 6px 12px;
    text-align: left;
    font-size: 12px;
  }
  .preview-content table th { background: #f3f4f6; font-weight: 500; }
  .preview-content img { max-width: 100%; height: auto; }
  .preview-content hr { border: none; border-top: 1px solid #f3f4f6; margin: 16px 0; }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 24px;
    border-top: 1px solid #f3f4f6;
    background: #fafafa;
    flex-shrink: 0;
    font-size: 11px;
    color: #9ca3af;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">Markdownライブプレビュー</span>
      <span class="header-subtitle">Markdown Editor</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="btnDarkMode">ダークモード</button>
      <button class="btn btn-outline" id="btnPrint">印刷</button>
      <button class="btn" id="btnExport">HTML出力</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" data-action="bold" title="太字">B</button>
    <button class="toolbar-btn" data-action="italic" title="斜体">I</button>
    <button class="toolbar-btn" data-action="strikethrough" title="取り消し線">S</button>
    <button class="toolbar-btn" data-action="code" title="コード">&lt;/&gt;</button>
    <button class="toolbar-btn" data-action="link" title="リンク">Link</button>
    <button class="toolbar-btn" data-action="image" title="画像">Img</button>
    <button class="toolbar-btn" data-action="heading" title="見出し">H</button>
    <button class="toolbar-btn" data-action="list" title="リスト">List</button>
    <button class="toolbar-btn" data-action="olist" title="番号リスト">1.</button>
    <button class="toolbar-btn" data-action="quote" title="引用">></button>
    <button class="toolbar-btn" data-action="table" title="テーブル">Table</button>
    <button class="toolbar-btn" data-action="hr" title="水平線">---</button>
  </div>

  <div class="main">
    <div class="editor-pane">
      <div class="pane-label">エディタ</div>
      <textarea id="editor" spellcheck="false" placeholder="Markdownを入力..."></textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-label">プレビュー</div>
      <div class="preview-content" id="preview"></div>
    </div>
  </div>

  <div class="footer">
    <span id="wordCount">0 文字 / 0 単語 / 0 行</span>
    <span id="autoSaveStatus">自動保存: 有効</span>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // marked の設定（v9.x対応 - rendererを使ったコードハイライト）
  var renderer = new marked.Renderer();
  renderer.code = function(code, lang) {
    // marked v9では code が {text, lang} オブジェクトの場合がある
    if (typeof code === 'object') {
      lang = code.lang;
      code = code.text;
    }
    var highlighted;
    if (lang && hljs.getLanguage(lang)) {
      highlighted = hljs.highlight(code, { language: lang }).value;
    } else {
      highlighted = hljs.highlightAuto(code).value;
    }
    return '<pre><code class="hljs language-' + (lang || '') + '">' + highlighted + '</code></pre>';
  };

  marked.setOptions({
    renderer: renderer,
    breaks: true,
    gfm: true
  });

  var editor = document.getElementById('editor');
  var preview = document.getElementById('preview');
  var wordCountEl = document.getElementById('wordCount');

  // 初期サンプルテキスト
  var DEFAULT_TEXT = '# Markdownライブプレビュー\n\n段落テキストの例です。このエディタはリアルタイムでプレビューを表示します。\n\n## 機能一覧\n\n- 太字、斜体、コードなどの書式\n- コードハイライト\n- テーブル表示\n- ダークモード\n- HTML出力 / 印刷\n\n## コード例\n\n```javascript\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\n```\n\n> 引用テキストのサンプル\n\n| 項目 | 値 |\n|------|------|\n| 名前 | テスト |\n| 状態 | 有効 |\n\n---\n\nテキストは localStorage に自動保存されます。';

  // localStorageから復元、なければデフォルト
  var STORAGE_KEY = 'md-editor-content';
  var saved = localStorage.getItem(STORAGE_KEY);
  editor.value = saved !== null ? saved : DEFAULT_TEXT;

  // プレビュー更新
  function updatePreview() {
    preview.innerHTML = marked.parse(editor.value);
    updateWordCount();
  }

  // 文字数・単語数カウント
  function updateWordCount() {
    var text = editor.value;
    var charCount = text.length;
    var lines = text.split('\n').length;
    var words = text.trim().split(/\s+/).filter(function(w) { return w.length > 0; });
    var wordCount = text.trim() === '' ? 0 : words.length;
    wordCountEl.textContent = charCount + ' 文字 / ' + wordCount + ' 単語 / ' + lines + ' 行';
  }

  // 自動保存（デバウンス）
  var saveTimer = null;
  function autoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      localStorage.setItem(STORAGE_KEY, editor.value);
    }, 500);
  }

  // 入力イベント
  editor.addEventListener('input', function() {
    updatePreview();
    autoSave();
  });

  // 初回描画
  updatePreview();

  // ツールバー操作
  document.querySelectorAll('.toolbar-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      applyFormat(btn.dataset.action);
    });
  });

  function applyFormat(action) {
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    var text = editor.value;
    var selected = text.substring(start, end);
    var replacement = '';
    var cursorOffset = 0;

    switch (action) {
      case 'bold':
        replacement = '**' + (selected || 'テキスト') + '**';
        cursorOffset = selected ? replacement.length : 2;
        break;
      case 'italic':
        replacement = '*' + (selected || 'テキスト') + '*';
        cursorOffset = selected ? replacement.length : 1;
        break;
      case 'strikethrough':
        replacement = '~~' + (selected || 'テキスト') + '~~';
        cursorOffset = selected ? replacement.length : 2;
        break;
      case 'code':
        if (selected.includes('\n')) {
          replacement = '```\n' + selected + '\n```';
        } else {
          replacement = '`' + (selected || 'code') + '`';
        }
        cursorOffset = selected ? replacement.length : 1;
        break;
      case 'link':
        replacement = '[' + (selected || 'リンクテキスト') + '](url)';
        cursorOffset = selected ? replacement.length : 1;
        break;
      case 'image':
        replacement = '![' + (selected || '代替テキスト') + '](url)';
        cursorOffset = selected ? replacement.length : 2;
        break;
      case 'heading':
        var lineStart = text.lastIndexOf('\n', start - 1) + 1;
        var lineText = text.substring(lineStart, end);
        if (lineText.startsWith('### ')) {
          editor.value = text.substring(0, lineStart) + lineText.replace(/^### /, '') + text.substring(end);
        } else if (lineText.startsWith('## ')) {
          editor.value = text.substring(0, lineStart) + lineText.replace(/^## /, '### ') + text.substring(end);
        } else if (lineText.startsWith('# ')) {
          editor.value = text.substring(0, lineStart) + lineText.replace(/^# /, '## ') + text.substring(end);
        } else {
          editor.value = text.substring(0, lineStart) + '# ' + lineText + text.substring(end);
        }
        updatePreview();
        autoSave();
        editor.focus();
        return;
      case 'list':
        var listLines = (selected || '項目').split('\n');
        replacement = listLines.map(function(l) { return '- ' + l; }).join('\n');
        cursorOffset = replacement.length;
        break;
      case 'olist':
        var olistLines = (selected || '項目').split('\n');
        replacement = olistLines.map(function(l, i) { return (i + 1) + '. ' + l; }).join('\n');
        cursorOffset = replacement.length;
        break;
      case 'quote':
        var quoteLines = (selected || '引用テキスト').split('\n');
        replacement = quoteLines.map(function(l) { return '> ' + l; }).join('\n');
        cursorOffset = replacement.length;
        break;
      case 'table':
        replacement = '\n| 列1 | 列2 | 列3 |\n|------|------|------|\n| a | b | c |\n';
        cursorOffset = replacement.length;
        break;
      case 'hr':
        replacement = '\n---\n';
        cursorOffset = replacement.length;
        break;
    }

    editor.value = text.substring(0, start) + replacement + text.substring(end);
    editor.selectionStart = start + cursorOffset;
    editor.selectionEnd = start + cursorOffset;
    editor.focus();
    updatePreview();
    autoSave();
  }

  // キーボードショートカット
  editor.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      switch (e.key) {
        case 'b':
          e.preventDefault();
          applyFormat('bold');
          break;
        case 'i':
          e.preventDefault();
          applyFormat('italic');
          break;
        case 'k':
          e.preventDefault();
          applyFormat('link');
          break;
      }
    }
    // Tab挿入
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = editor.selectionStart;
      var eEnd = editor.selectionEnd;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(eEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
      updatePreview();
      autoSave();
    }
  });

  // ダークモード切替
  document.getElementById('btnDarkMode').addEventListener('click', function() {
    document.body.classList.toggle('dark');
    var isDark = document.body.classList.contains('dark');
    document.getElementById('btnDarkMode').textContent = isDark ? 'ライトモード' : 'ダークモード';

    var hlLink = document.getElementById('hljs-style');
    if (isDark) {
      hlLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    } else {
      hlLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    }

    updatePreview();
  });

  // HTMLエクスポート
  document.getElementById('btnExport').addEventListener('click', function() {
    var htmlContent = '<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Markdown出力</title>\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">\n<style>\nbody { font-family: \'Inter\', \'Helvetica Neue\', Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1a1a2e; line-height: 1.8; font-size: 14px; }\nh1 { font-size: 24px; margin: 32px 0 16px; }\nh2 { font-size: 18px; margin: 24px 0 12px; border-bottom: 1px solid #f3f4f6; padding-bottom: 6px; }\nh3 { font-size: 15px; margin: 20px 0 8px; }\ncode { background: #f3f4f6; padding: 2px 6px; border-radius: 2px; font-size: 13px; }\npre { background: #f3f4f6; padding: 16px; border-radius: 2px; overflow-x: auto; }\npre code { background: none; padding: 0; }\nblockquote { border-left: 3px solid #e5e7eb; padding-left: 16px; color: #6b7280; margin: 12px 0; }\ntable { border-collapse: collapse; margin: 12px 0; }\nth, td { border: 1px solid #e5e7eb; padding: 8px 12px; }\nth { background: #f3f4f6; }\na { color: #1e3461; }\n</style>\n</head>\n<body>\n' + marked.parse(editor.value) + '\n</body>\n</html>';

    var blob = new Blob([htmlContent], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'markdown-output.html';
    a.click();
    URL.revokeObjectURL(url);

    showToast('HTMLファイルをダウンロードしました');
  });

  // 印刷
  document.getElementById('btnPrint').addEventListener('click', function() {
    var printWindow = window.open('', '_blank');
    var htmlContent = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>印刷プレビュー</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"><style>body{font-family:\'Helvetica Neue\',Arial,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;color:#1a1a2e;line-height:1.8;font-size:14px;}h1{font-size:24px;}h2{font-size:18px;border-bottom:1px solid #e5e7eb;padding-bottom:6px;}code{background:#f3f4f6;padding:2px 6px;border-radius:2px;font-size:13px;}pre{background:#f3f4f6;padding:16px;overflow-x:auto;}pre code{background:none;padding:0;}blockquote{border-left:3px solid #e5e7eb;padding-left:16px;color:#6b7280;}table{border-collapse:collapse;}th,td{border:1px solid #e5e7eb;padding:8px 12px;}th{background:#f3f4f6;}</style></head><body>' + marked.parse(editor.value) + '</body></html>';
    printWindow.document.write(htmlContent);
    printWindow.document.close();
    printWindow.onload = function() {
      printWindow.print();
    };
  });

  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1500);
  }
</script>
</body>
</html>
