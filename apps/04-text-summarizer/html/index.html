<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テキスト要約・翻訳ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #ffffff;
      color: #1a1a2e;
      font-size: 13px;
      letter-spacing: -0.01em;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
    }

    /* セクション共通 */
    .section {
      margin-bottom: 32px;
    }

    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    /* APIキー入力 */
    .api-key-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .api-key-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 2px;
      font-size: 13px;
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #1a1a2e;
      transition: border-color 0.2s;
    }

    .api-key-input:focus {
      outline: none;
      border-color: #1e3461;
    }

    /* テキストエリア */
    .textarea-wrapper {
      position: relative;
    }

    .text-input {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 2px;
      font-size: 13px;
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      line-height: 1.7;
      resize: vertical;
      transition: border-color 0.2s;
      color: #1a1a2e;
    }

    .text-input:focus {
      outline: none;
      border-color: #1e3461;
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* モード選択 */
    .mode-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mode-btn {
      padding: 8px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 2px;
      background: #ffffff;
      font-size: 12px;
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn:hover {
      border-color: #1e3461;
      color: #1e3461;
    }

    .mode-btn.active {
      background-color: #1e3461;
      border-color: #1e3461;
      color: #ffffff;
    }

    /* 実行ボタン */
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      background-color: #1e3461;
      color: #ffffff;
      border: none;
      border-radius: 2px;
      font-size: 12px;
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      min-width: 120px;
    }

    .submit-btn:hover:not(:disabled) {
      background-color: #2e4f87;
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ローディングスピナー */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 結果表示エリア */
    .result-section {
      display: none;
    }

    .result-section.visible {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .result-box {
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 2px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 100px;
      color: #1a1a2e;
    }

    .copy-btn {
      padding: 8px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 2px;
      background: #ffffff;
      font-size: 12px;
      font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: #1e3461;
      color: #1e3461;
    }

    .copy-btn.copied {
      border-color: #1e3461;
      background-color: #1e3461;
      color: #ffffff;
    }

    /* エラーメッセージ */
    .error-msg {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    /* フッター */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <main class="container">

    <div class="page-header">
      <h1>テキスト要約・翻訳ツール</h1>
      <p>Anthropic API を使用した要約・翻訳</p>
    </div>

    <!-- APIキー入力 -->
    <div class="section">
      <label class="section-label" for="apiKey">APIキー</label>
      <div class="api-key-row">
        <input
          type="password"
          id="apiKey"
          class="api-key-input"
          placeholder="sk-ant-... を入力"
          autocomplete="off"
        >
      </div>
    </div>

    <!-- テキスト入力 -->
    <div class="section">
      <label class="section-label" for="inputText">入力テキスト</label>
      <div class="textarea-wrapper">
        <textarea
          id="inputText"
          class="text-input"
          placeholder="要約または翻訳したいテキストを入力してください"
        ></textarea>
      </div>
      <div class="char-count" id="charCount">0 文字</div>
    </div>

    <!-- モード選択 -->
    <div class="section">
      <span class="section-label">処理モード</span>
      <div class="mode-group" id="modeGroup">
        <button class="mode-btn active" data-mode="summary-bullet">要約（箇条書き）</button>
        <button class="mode-btn" data-mode="summary-paragraph">要約（段落）</button>
        <button class="mode-btn" data-mode="ja-to-en">日 → 英 翻訳</button>
        <button class="mode-btn" data-mode="en-to-ja">英 → 日 翻訳</button>
      </div>
    </div>

    <!-- 実行ボタン -->
    <div class="section">
      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        実行
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- 結果表示 -->
    <div class="section result-section" id="resultSection">
      <div class="result-header">
        <span class="section-label" style="margin-bottom: 0;">結果</span>
        <button class="copy-btn" id="copyBtn" onclick="handleCopy()">コピー</button>
      </div>
      <div class="result-box" id="resultBox"></div>
    </div>

  </main>

  <footer class="footer">
    テキスト要約・翻訳ツール
  </footer>

  <script>
    // 選択中のモード
    let selectedMode = 'summary-bullet';

    // モードボタンの切り替え処理
    document.getElementById('modeGroup').addEventListener('click', function(e) {
      const btn = e.target.closest('.mode-btn');
      if (!btn) return;

      // 全ボタンからactiveを外し、押されたボタンにactiveを付与
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });

    // 文字数カウント
    document.getElementById('inputText').addEventListener('input', function() {
      const count = this.value.length;
      document.getElementById('charCount').textContent = count.toLocaleString() + ' 文字';
    });

    // モードに応じたプロンプトを生成
    function buildPrompt(text, mode) {
      const prompts = {
        'summary-bullet': `以下のテキストを箇条書きで要約してください。重要なポイントを漏れなく抽出し、簡潔にまとめてください。\n\n${text}`,
        'summary-paragraph': `以下のテキストを段落形式で要約してください。原文の要点を保ちつつ、読みやすい文章にまとめてください。\n\n${text}`,
        'ja-to-en': `以下の日本語テキストを英語に翻訳してください。自然で読みやすい英語にしてください。\n\n${text}`,
        'en-to-ja': `以下の英語テキストを日本語に翻訳してください。自然で読みやすい日本語にしてください。\n\n${text}`
      };
      return prompts[mode] || prompts['summary-bullet'];
    }

    // エラー表示
    function showError(message) {
      const el = document.getElementById('errorMsg');
      el.textContent = message;
      el.classList.add('visible');
    }

    // エラー非表示
    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    // メイン処理
    async function handleSubmit() {
      hideError();

      const apiKey = document.getElementById('apiKey').value.trim();
      const inputText = document.getElementById('inputText').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const resultSection = document.getElementById('resultSection');
      const resultBox = document.getElementById('resultBox');

      // バリデーション
      if (!apiKey) {
        showError('APIキーを入力してください。');
        return;
      }
      if (!inputText) {
        showError('テキストを入力してください。');
        return;
      }

      // ローディング状態に切り替え
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>処理中...';
      resultSection.classList.remove('visible');

      try {
        const prompt = buildPrompt(inputText, selectedMode);

        // Anthropic API 呼び出し
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4096,
            messages: [
              { role: 'user', content: prompt }
            ]
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          const errorMessage = errorData?.error?.message || `APIエラー (${response.status})`;
          throw new Error(errorMessage);
        }

        const data = await response.json();
        const resultText = data.content?.[0]?.text || '結果を取得できませんでした。';

        // 結果を表示
        resultBox.textContent = resultText;
        resultSection.classList.add('visible');

      } catch (error) {
        showError(error.message || 'リクエスト中にエラーが発生しました。');
      } finally {
        // ボタンを元に戻す
        submitBtn.disabled = false;
        submitBtn.innerHTML = '実行';
      }
    }

    // コピー処理
    async function handleCopy() {
      const resultBox = document.getElementById('resultBox');
      const copyBtn = document.getElementById('copyBtn');
      const text = resultBox.textContent;

      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'コピー済み';
        copyBtn.classList.add('copied');

        // 2秒後に元に戻す
        setTimeout(() => {
          copyBtn.textContent = 'コピー';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch {
        // フォールバック: execCommand を使用
        const range = document.createRange();
        range.selectNodeContents(resultBox);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand('copy');
        selection.removeAllRanges();

        copyBtn.textContent = 'コピー済み';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'コピー';
          copyBtn.classList.remove('copied');
        }, 2000);
      }
    }
  </script>

</body>
</html>
