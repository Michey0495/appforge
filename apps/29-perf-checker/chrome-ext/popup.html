<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 12px;
    color: #1a1a2e;
    background: #ffffff;
    width: 360px;
    padding: 16px;
    line-height: 1.5;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #f3f4f6;
  }
  .header-title { font-size: 13px; font-weight: 600; }
  .header-subtitle { font-size: 10px; color: #9ca3af; }

  .score-section {
    text-align: center;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #f3f4f6;
    border-radius: 2px;
  }
  .score-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
  .score-value { font-size: 28px; font-weight: 700; margin: 4px 0; }
  .score-badge {
    display: inline-block;
    padding: 2px 10px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 2px;
  }
  .score-good { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; }
  .score-medium { color: #d97706; background: #fffbeb; border: 1px solid #fde68a; }
  .score-bad { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .metric-card {
    padding: 10px;
    border: 1px solid #f3f4f6;
    border-radius: 2px;
  }
  .metric-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
  .metric-value { font-size: 16px; font-weight: 600; color: #1e3461; }
  .metric-unit { font-size: 10px; color: #9ca3af; font-weight: 400; }

  .suggestions {
    margin-top: 12px;
    border-top: 1px solid #f3f4f6;
    padding-top: 12px;
  }
  .suggestions-title { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 8px; }
  .suggestion-item {
    padding: 6px 0;
    font-size: 11px;
    color: #374151;
    border-bottom: 1px solid #f3f4f6;
    line-height: 1.5;
  }
  .suggestion-item:last-child { border-bottom: none; }

  .loading {
    text-align: center;
    padding: 40px 16px;
    color: #9ca3af;
  }

  .error {
    padding: 10px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 2px;
    color: #dc2626;
    font-size: 11px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    background: #1e3461;
    color: #ffffff;
    transition: background 0.15s;
  }
  .btn:hover { background: #2e4f87; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">ページ速度チェッカー</div>
      <div class="header-subtitle">Performance API 計測結果</div>
    </div>
    <button class="btn" id="refreshBtn">再計測</button>
  </div>
  <div id="content">
    <div class="loading">計測中...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
