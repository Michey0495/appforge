<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON / APIレスポンス整形ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f3f4f6;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-subtitle { font-size: 11px; color: #9ca3af; }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 6px;
  }

  textarea, input[type="text"] {
    width: 100%;
    border: 1px solid #e5e7eb;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    border-radius: 2px;
    color: #1a1a2e;
    background: #ffffff;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus, input[type="text"]:focus { border-color: #1e3461; }
  textarea { min-height: 180px; resize: vertical; line-height: 1.7; }

  .section { margin-bottom: 32px; }

  .btn {
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #2e4f87; }

  .btn-outline {
    background: transparent;
    color: #1e3461;
    border: 1px solid #e5e7eb;
  }
  .btn-outline:hover { background: #f3f4f6; }
  .btn-outline.active {
    background: #1e3461;
    color: #ffffff;
    border-color: #1e3461;
  }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid #f3f4f6;
  }
  .tab {
    padding: 8px 20px;
    font-size: 12px;
    font-family: inherit;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: #6b7280;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: #1a1a2e; }
  .tab.active {
    color: #1e3461;
    border-bottom-color: #1e3461;
    font-weight: 500;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .side-by-side {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .output-area {
    width: 100%;
    min-height: 200px;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    padding: 0;
    background: #fafafa;
    overflow: auto;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.7;
  }
  .output-area:empty::before {
    content: '結果がここに表示されます';
    color: #9ca3af;
    padding: 16px;
    display: block;
  }

  .line {
    display: flex;
    padding: 0 12px 0 0;
  }
  .line-no {
    display: inline-block;
    min-width: 36px;
    padding: 0 8px;
    text-align: right;
    color: #9ca3af;
    user-select: none;
    background: #f3f4f6;
    border-right: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .line-content {
    padding-left: 12px;
    white-space: pre;
  }

  .json-key { color: #1e3461; }
  .json-string { color: #166534; }
  .json-number { color: #c2410c; }
  .json-boolean { color: #7c3aed; }
  .json-null { color: #9ca3af; }

  .tree-view { padding: 16px; }
  .tree-node { margin-left: 20px; }
  .tree-toggle {
    cursor: pointer;
    user-select: none;
    color: #6b7280;
    display: inline-block;
    width: 12px;
  }
  .tree-toggle:hover { color: #1e3461; }
  .tree-key { color: #1e3461; font-weight: 500; }
  .tree-children { display: block; }
  .tree-children.collapsed { display: none; }

  .diff-added { background: #ecfdf5; }
  .diff-removed { background: #fef2f2; }
  .diff-changed { background: #fffbeb; }

  .error-msg {
    color: #b91c1c;
    font-size: 12px;
    margin-top: 8px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .search-row .field { flex: 1; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  /* インデント選択 */
  .indent-select {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .indent-select label {
    margin-bottom: 0;
    font-size: 11px;
  }
  .indent-select select {
    border: 1px solid #e5e7eb;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 2px;
    background: #fff;
    color: #1a1a2e;
    outline: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="header-title">JSON / APIレスポンス整形ツール</span>
    <span class="header-subtitle">JSON Formatter & Diff</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="format">整形 / 検証</button>
    <button class="tab" data-tab="diff">差分比較</button>
  </div>

  <!-- 整形パネル -->
  <div class="panel active" id="panelFormat">
    <div class="section">
      <label>JSON入力</label>
      <textarea id="jsonInput" placeholder='{"key": "value", ...}'></textarea>
    </div>

    <div class="section">
      <div class="indent-select">
        <label>インデント</label>
        <select id="indentSize">
          <option value="2" selected>2スペース</option>
          <option value="4">4スペース</option>
          <option value="tab">タブ</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn" id="btnFormat">整形</button>
        <button class="btn btn-outline" id="btnMinify">圧縮</button>
        <button class="btn btn-outline" id="btnValidate">検証</button>
        <button class="btn btn-outline" id="btnTreeView">ツリー表示</button>
      </div>
    </div>

    <div class="section">
      <div class="search-row">
        <div class="field">
          <label>JSONPath検索</label>
          <input type="text" id="jsonPath" placeholder="例: data.users[0].name">
        </div>
        <button class="btn" id="btnSearch" style="margin-bottom: 0;">検索</button>
      </div>
    </div>

    <div class="section">
      <div class="result-header">
        <label style="margin-bottom:0;">結果</label>
        <button class="btn btn-outline" id="btnCopyFormat" style="font-size:11px; padding:4px 10px;">コピー</button>
      </div>
      <div class="output-area" id="formatOutput"></div>
    </div>
  </div>

  <!-- 差分パネル -->
  <div class="panel" id="panelDiff">
    <div class="section">
      <div class="side-by-side">
        <div>
          <label>JSON A</label>
          <textarea id="diffA" placeholder="1つ目のJSON"></textarea>
        </div>
        <div>
          <label>JSON B</label>
          <textarea id="diffB" placeholder="2つ目のJSON"></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <button class="btn" id="btnDiff">差分を表示</button>
    </div>

    <div class="section">
      <label>差分結果</label>
      <div class="output-area" id="diffOutput"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
  // タブ切替
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('panel' + capitalize(tab.dataset.tab)).classList.add('active');
    });
  });

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // インデントサイズ取得
  function getIndent() {
    var val = document.getElementById('indentSize').value;
    if (val === 'tab') return '\t';
    return parseInt(val, 10);
  }

  // シンタックスハイライト付きHTML生成（lookbehindを使わない実装）
  function highlightJson(json, indent) {
    var formatted = JSON.stringify(json, null, indent);
    var result = '';
    var i = 0;
    var len = formatted.length;

    while (i < len) {
      var ch = formatted[i];

      // 文字列の処理
      if (ch === '"') {
        var strStart = i;
        i++;
        while (i < len) {
          if (formatted[i] === '\\') {
            i += 2;
            continue;
          }
          if (formatted[i] === '"') {
            i++;
            break;
          }
          i++;
        }
        var str = formatted.slice(strStart, i);
        var escapedStr = escapeHtml(str);

        // 後続にコロンがあればキー
        var afterStr = i;
        while (afterStr < len && (formatted[afterStr] === ' ' || formatted[afterStr] === '\t')) afterStr++;
        if (formatted[afterStr] === ':') {
          result += '<span class="json-key">' + escapedStr + '</span>';
        } else {
          result += '<span class="json-string">' + escapedStr + '</span>';
        }
        continue;
      }

      // 数値の処理
      if (ch === '-' || (ch >= '0' && ch <= '9')) {
        var numStart = i;
        if (ch === '-') i++;
        while (i < len && ((formatted[i] >= '0' && formatted[i] <= '9') || formatted[i] === '.' || formatted[i] === 'e' || formatted[i] === 'E' || formatted[i] === '+' || formatted[i] === '-')) {
          if ((formatted[i] === '+' || formatted[i] === '-') && formatted[i-1] !== 'e' && formatted[i-1] !== 'E') break;
          i++;
        }
        result += '<span class="json-number">' + escapeHtml(formatted.slice(numStart, i)) + '</span>';
        continue;
      }

      // true
      if (formatted.slice(i, i + 4) === 'true') {
        result += '<span class="json-boolean">true</span>';
        i += 4;
        continue;
      }

      // false
      if (formatted.slice(i, i + 5) === 'false') {
        result += '<span class="json-boolean">false</span>';
        i += 5;
        continue;
      }

      // null
      if (formatted.slice(i, i + 4) === 'null') {
        result += '<span class="json-null">null</span>';
        i += 4;
        continue;
      }

      // その他の文字はそのまま
      result += escapeHtml(ch);
      i++;
    }

    return result;
  }

  // 行番号付きで出力
  function renderWithLineNumbers(el, html) {
    var lines = html.split('\n');
    el.innerHTML = lines.map(function(line, i) {
      return '<div class="line"><span class="line-no">' + (i + 1) + '</span><span class="line-content">' + line + '</span></div>';
    }).join('');
  }

  // JSONパース共通
  function tryParseJson(text) {
    try {
      return { data: JSON.parse(text), error: null };
    } catch (e) {
      return { data: null, error: e.message };
    }
  }

  // 整形ボタン
  document.getElementById('btnFormat').addEventListener('click', function() {
    var input = document.getElementById('jsonInput').value.trim();
    var output = document.getElementById('formatOutput');
    if (!input) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSONを入力してください</div>';
      return;
    }
    var parsed = tryParseJson(input);
    if (parsed.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON解析エラー: ' + escapeHtml(parsed.error) + '</div>';
      return;
    }
    var html = highlightJson(parsed.data, getIndent());
    renderWithLineNumbers(output, html);
  });

  // 圧縮ボタン
  document.getElementById('btnMinify').addEventListener('click', function() {
    var input = document.getElementById('jsonInput').value.trim();
    var output = document.getElementById('formatOutput');
    if (!input) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSONを入力してください</div>';
      return;
    }
    var parsed = tryParseJson(input);
    if (parsed.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON解析エラー: ' + escapeHtml(parsed.error) + '</div>';
      return;
    }
    var minified = JSON.stringify(parsed.data);
    renderWithLineNumbers(output, escapeHtml(minified));
  });

  // 検証ボタン
  document.getElementById('btnValidate').addEventListener('click', function() {
    var input = document.getElementById('jsonInput').value.trim();
    var output = document.getElementById('formatOutput');
    if (!input) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSONを入力してください</div>';
      return;
    }
    var parsed = tryParseJson(input);
    if (parsed.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">不正なJSON: ' + escapeHtml(parsed.error) + '</div>';
    } else {
      var data = parsed.data;
      var type = Array.isArray(data) ? '配列' : (typeof data === 'object' && data !== null) ? 'オブジェクト' : typeof data;
      var keys = (typeof data === 'object' && data !== null) ? Object.keys(data).length : 0;
      var size = new Blob([input]).size;
      var depth = computeDepth(data);
      output.innerHTML = '<div style="padding:16px;">有効なJSONです<br>型: ' + type + '<br>トップレベルキー数: ' + keys + '<br>最大深度: ' + depth + '<br>サイズ: ' + formatBytes(size) + '</div>';
    }
  });

  function computeDepth(obj) {
    if (obj === null || typeof obj !== 'object') return 0;
    var maxChild = 0;
    var entries = Array.isArray(obj) ? obj : Object.values(obj);
    for (var i = 0; i < entries.length; i++) {
      var d = computeDepth(entries[i]);
      if (d > maxChild) maxChild = d;
    }
    return maxChild + 1;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ツリービュー
  document.getElementById('btnTreeView').addEventListener('click', function() {
    var input = document.getElementById('jsonInput').value.trim();
    var output = document.getElementById('formatOutput');
    if (!input) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSONを入力してください</div>';
      return;
    }
    var parsed = tryParseJson(input);
    if (parsed.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON解析エラー: ' + escapeHtml(parsed.error) + '</div>';
      return;
    }
    output.innerHTML = '<div class="tree-view">' + buildTree(parsed.data, '') + '</div>';
    output.querySelectorAll('.tree-toggle').forEach(function(toggle) {
      toggle.addEventListener('click', function() {
        var children = toggle.parentElement.querySelector('.tree-children');
        if (children) {
          children.classList.toggle('collapsed');
          toggle.textContent = children.classList.contains('collapsed') ? '+' : '-';
        }
      });
    });
  });

  function buildTree(obj, path) {
    if (obj === null) return '<span class="json-null">null</span>';
    if (typeof obj !== 'object') {
      if (typeof obj === 'string') return '<span class="json-string">"' + escapeHtml(obj) + '"</span>';
      if (typeof obj === 'number') return '<span class="json-number">' + obj + '</span>';
      if (typeof obj === 'boolean') return '<span class="json-boolean">' + obj + '</span>';
      return String(obj);
    }

    var isArray = Array.isArray(obj);
    var entries = isArray ? obj.map(function(v, i) { return [i, v]; }) : Object.entries(obj);
    var bracket = isArray ? ['[', ']'] : ['{', '}'];

    if (entries.length === 0) return bracket[0] + bracket[1];

    var html = '<span class="tree-toggle">-</span> ' + bracket[0] + '<div class="tree-children">';
    entries.forEach(function(entry) {
      var key = entry[0];
      var val = entry[1];
      var keyLabel = isArray
        ? '<span class="json-number">' + key + '</span>'
        : '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>';
      html += '<div class="tree-node">' + keyLabel + ': ' + buildTree(val, path + '.' + key) + '</div>';
    });
    html += '</div>' + bracket[1];
    return html;
  }

  // JSONPath検索
  document.getElementById('btnSearch').addEventListener('click', function() {
    var input = document.getElementById('jsonInput').value.trim();
    var pathStr = document.getElementById('jsonPath').value.trim();
    var output = document.getElementById('formatOutput');
    if (!input) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSONを入力してください</div>';
      return;
    }
    var parsed = tryParseJson(input);
    if (parsed.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON解析エラー: ' + escapeHtml(parsed.error) + '</div>';
      return;
    }
    if (!pathStr) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">パスを入力してください</div>';
      return;
    }

    try {
      var result = resolveJsonPath(parsed.data, pathStr);
      var html = highlightJson(result, getIndent());
      renderWithLineNumbers(output, html);
    } catch (e) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">パス解決エラー: ' + escapeHtml(e.message) + '</div>';
    }
  });

  // Enterキーで検索実行
  document.getElementById('jsonPath').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('btnSearch').click();
    }
  });

  // 簡易JSONPathリゾルバ
  function resolveJsonPath(obj, path) {
    // $. プレフィクスの除去
    if (path.startsWith('$.')) path = path.slice(2);
    if (path.startsWith('$')) path = path.slice(1);

    var parts = path.replace(/\[(\d+)\]/g, '.$1').split('.').filter(Boolean);
    var current = obj;
    for (var i = 0; i < parts.length; i++) {
      if (current === null || current === undefined) {
        throw new Error('"' + path + '" が見つかりません');
      }
      current = current[parts[i]];
    }
    if (current === undefined) {
      throw new Error('"' + path + '" が見つかりません');
    }
    return current;
  }

  // 差分比較
  document.getElementById('btnDiff').addEventListener('click', function() {
    var a = document.getElementById('diffA').value.trim();
    var b = document.getElementById('diffB').value.trim();
    var output = document.getElementById('diffOutput');

    if (!a || !b) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">両方のJSONを入力してください</div>';
      return;
    }

    var parsedA = tryParseJson(a);
    var parsedB = tryParseJson(b);

    if (parsedA.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON A エラー: ' + escapeHtml(parsedA.error) + '</div>';
      return;
    }
    if (parsedB.error) {
      output.innerHTML = '<div style="padding:16px;" class="error-msg">JSON B エラー: ' + escapeHtml(parsedB.error) + '</div>';
      return;
    }

    var diffs = computeDiff(parsedA.data, parsedB.data, '');
    if (diffs.length === 0) {
      output.innerHTML = '<div style="padding:16px; color:#6b7280;">差分はありません</div>';
      return;
    }

    var html = '';
    diffs.forEach(function(d, idx) {
      var lineNo = idx + 1;
      var cls = '';
      if (d.type === 'added') cls = 'diff-added';
      if (d.type === 'removed') cls = 'diff-removed';
      if (d.type === 'changed') cls = 'diff-changed';

      var prefix = d.type === 'added' ? '+' : d.type === 'removed' ? '-' : '~';
      html += '<div class="line ' + cls + '"><span class="line-no">' + lineNo + '</span><span class="line-content">' + prefix + ' ' + escapeHtml(d.path) + ': ' + escapeHtml(d.detail) + '</span></div>';
    });

    output.innerHTML = html;
  });

  // 再帰的差分計算
  function computeDiff(a, b, path) {
    var diffs = [];
    var aType = typeof a;
    var bType = typeof b;

    if (aType !== bType || Array.isArray(a) !== Array.isArray(b)) {
      diffs.push({ type: 'changed', path: path || '(root)', detail: JSON.stringify(a) + ' -> ' + JSON.stringify(b) });
      return diffs;
    }

    if (a === null || b === null || aType !== 'object') {
      if (a !== b) {
        diffs.push({ type: 'changed', path: path || '(root)', detail: JSON.stringify(a) + ' -> ' + JSON.stringify(b) });
      }
      return diffs;
    }

    var aKeys = Object.keys(a);
    var bKeys = Object.keys(b);
    var bKeySet = {};
    bKeys.forEach(function(k) { bKeySet[k] = true; });
    var aKeySet = {};
    aKeys.forEach(function(k) { aKeySet[k] = true; });

    // Aにだけ存在
    aKeys.forEach(function(key) {
      if (!bKeySet[key]) {
        diffs.push({ type: 'removed', path: path + '.' + key, detail: JSON.stringify(a[key]) });
      }
    });

    // Bにだけ存在
    bKeys.forEach(function(key) {
      if (!aKeySet[key]) {
        diffs.push({ type: 'added', path: path + '.' + key, detail: JSON.stringify(b[key]) });
      }
    });

    // 両方に存在
    aKeys.forEach(function(key) {
      if (bKeySet[key]) {
        var childDiffs = computeDiff(a[key], b[key], path + '.' + key);
        diffs.push.apply(diffs, childDiffs);
      }
    });

    return diffs;
  }

  // コピー
  document.getElementById('btnCopyFormat').addEventListener('click', function() {
    var output = document.getElementById('formatOutput');
    var text = output.textContent || output.innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      showToast('コピーしました');
    });
  });

  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1500);
  }
</script>
</body>
</html>
