<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- タイトル -->
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1e3461" font-weight="bold">承認フロー</text>

  <!-- ボックス1: 申請 -->
  <rect x="300" y="70" width="200" height="70" fill="#1e3461" rx="0"/>
  <text x="400" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">申請書作成</text>
  <text x="400" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a0b4d0">担当者が起案</text>

  <!-- 矢印1 -->
  <line x1="400" y1="140" x2="400" y2="185" stroke="#6b7280" stroke-width="2"/>
  <polygon points="394,180 400,195 406,180" fill="#6b7280"/>

  <!-- ボックス2: 一次承認 -->
  <rect x="300" y="195" width="200" height="70" fill="#4a90d9" rx="0"/>
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">一次承認</text>
  <text x="400" y="247" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d0e0f5">部門マネージャー</text>

  <!-- 差し戻し矢印（左） -->
  <line x1="300" y1="230" x2="240" y2="230" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="240" y1="230" x2="240" y2="105" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="240" y1="105" x2="295" y2="105" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="290,99 300,105 290,111" fill="#c0392b"/>
  <text x="218" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">差し戻し</text>

  <!-- 矢印2 -->
  <line x1="400" y1="265" x2="400" y2="310" stroke="#6b7280" stroke-width="2"/>
  <polygon points="394,305 400,320 406,305" fill="#6b7280"/>

  <!-- ボックス3: 二次承認 -->
  <rect x="300" y="320" width="200" height="70" fill="#4a90d9" rx="0"/>
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">二次承認</text>
  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d0e0f5">本部長</text>

  <!-- 差し戻し矢印（右） -->
  <line x1="500" y1="355" x2="560" y2="355" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="560" y1="355" x2="560" y2="230" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="560" y1="230" x2="505" y2="230" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="510,224 500,230 510,236" fill="#c0392b"/>
  <text x="582" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">差し戻し</text>

  <!-- 矢印3 -->
  <line x1="400" y1="390" x2="400" y2="435" stroke="#6b7280" stroke-width="2"/>
  <polygon points="394,430 400,445 406,430" fill="#6b7280"/>

  <!-- ボックス4: 完了 -->
  <rect x="300" y="445" width="200" height="70" fill="#1e3461" rx="0"/>
  <text x="400" y="475" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">承認完了</text>
  <text x="400" y="497" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a0b4d0">経理部へ自動通知</text>

  <!-- 注釈 -->
  <text x="400" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">10万円以上の経費は二次承認が必要</text>
</svg>
