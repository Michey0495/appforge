<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- ロゴマーク: 六角形ベースのジオメトリック -->
  <polygon points="400,140 480,186 480,278 400,324 320,278 320,186" fill="none" stroke="#1e3461" stroke-width="4"/>
  <polygon points="400,170 455,200 455,260 400,290 345,260 345,200" fill="#1e3461"/>
  <polygon points="400,195 430,213 430,249 400,267 370,249 370,213" fill="#4a90d9"/>

  <!-- 装飾ライン -->
  <line x1="320" y1="186" x2="280" y2="162" stroke="#1e3461" stroke-width="2"/>
  <line x1="480" y1="186" x2="520" y2="162" stroke="#1e3461" stroke-width="2"/>
  <line x1="320" y1="278" x2="280" y2="302" stroke="#4a90d9" stroke-width="2"/>
  <line x1="480" y1="278" x2="520" y2="302" stroke="#4a90d9" stroke-width="2"/>

  <!-- 社名 -->
  <text x="400" y="385" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#1e3461" font-weight="bold" letter-spacing="8">NEXBRIDGE</text>

