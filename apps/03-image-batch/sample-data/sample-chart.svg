<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- タイトル -->
  <text x="400" y="45" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e3461" font-weight="bold">四半期別売上実績</text>

  <!-- Y軸 -->
  <line x1="100" y1="80" x2="100" y2="480" stroke="#6b7280" stroke-width="1.5"/>
  <!-- X軸 -->
  <line x1="100" y1="480" x2="720" y2="480" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Y軸ラベル -->
  <text x="90" y="485" text-anchor="end" font-family="sans-serif" font-size="12" fill="#6b7280">0</text>
  <text x="90" y="385" text-anchor="end" font-family="sans-serif" font-size="12" fill="#6b7280">25</text>
  <line x1="96" y1="380" x2="720" y2="380" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="90" y="285" text-anchor="end" font-family="sans-serif" font-size="12" fill="#6b7280">50</text>
  <line x1="96" y1="280" x2="720" y2="280" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="90" y="185" text-anchor="end" font-family="sans-serif" font-size="12" fill="#6b7280">75</text>
  <line x1="96" y1="180" x2="720" y2="180" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="90" y="85" text-anchor="end" font-family="sans-serif" font-size="12" fill="#6b7280">100</text>
  <line x1="96" y1="80" x2="720" y2="80" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Y軸単位 -->
  <text x="30" y="280" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280" transform="rotate(-90,30,280)">売上高（百万円）</text>

  <!-- バー: Q1 -->
  <rect x="155" y="192" width="100" height="288" fill="#1e3461" rx="0"/>
  <text x="205" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e3461">Q1</text>
  <text x="205" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e3461" font-weight="bold">72</text>

  <!-- バー: Q2 -->
  <rect x="305" y="224" width="100" height="256" fill="#4a90d9" rx="0"/>
  <text x="355" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e3461">Q2</text>
  <text x="355" y="214" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4a90d9" font-weight="bold">64</text>

  <!-- バー: Q3 -->
  <rect x="455" y="160" width="100" height="320" fill="#1e3461" rx="0"/>
  <text x="505" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e3461">Q3</text>
  <text x="505" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e3461" font-weight="bold">80</text>

  <!-- バー: Q4 -->
  <rect x="605" y="112" width="100" height="368" fill="#4a90d9" rx="0"/>
  <text x="655" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e3461">Q4</text>
  <text x="655" y="102" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4a90d9" font-weight="bold">92</text>

  <!-- 凡例 -->
  <text x="400" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">2025年度 売上推移</text>
</svg>
