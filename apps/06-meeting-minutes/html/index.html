<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>議事録AI整形ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* リセットと基本設定 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ヘッダー */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f3f4f6;
  }
  .header-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .header-subtitle { font-size: 11px; color: #9ca3af; }

  /* ラベル */
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 6px;
  }

  /* 入力フィールド */
  input[type="password"],
  textarea {
    width: 100%;
    border: 1px solid #e5e7eb;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    border-radius: 2px;
    color: #1a1a2e;
    background: #ffffff;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus,
  textarea:focus {
    border-color: #1e3461;
  }

  textarea {
    min-height: 200px;
    resize: vertical;
    line-height: 1.7;
  }

  /* セクション間隔 */
  .section { margin-bottom: 32px; }

  /* APIキー行 */
  .api-row {
    display: flex;
    gap: 16px;
    align-items: flex-end;
  }
  .api-row .field { flex: 1; }

  /* モードボタン群 */
  .mode-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ボタン */
  .btn {
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #2e4f87; }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn.active {
    background: #2e4f87;
    box-shadow: inset 0 -2px 0 #ffffff;
  }

  .btn-outline {
    background: transparent;
    color: #1e3461;
    border: 1px solid #e5e7eb;
  }
  .btn-outline:hover {
    background: #f3f4f6;
  }

  /* 結果エリア */
  .result-wrapper {
    position: relative;
    margin-top: 8px;
  }
  .result-area {
    width: 100%;
    min-height: 200px;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    padding: 16px;
    background: #fafafa;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.8;
    font-size: 13px;
  }
  .result-area:empty::before {
    content: '結果がここに表示されます';
    color: #9ca3af;
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
  }

  /* ローディング */
  .loading {
    display: none;
    align-items: center;
    gap: 8px;
    color: #6b7280;
    font-size: 12px;
    margin-top: 12px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #e5e7eb;
    border-top-color: #1e3461;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* エラー */
  .error {
    color: #b91c1c;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .error.show { display: block; }

  /* コピー完了通知 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <!-- ヘッダー -->
  <div class="header">
    <span class="header-title">議事録AI整形ツール</span>
    <span class="header-subtitle">Meeting Minutes Formatter</span>
  </div>

  <!-- APIキー入力 -->
  <div class="section">
    <div class="api-row">
      <div class="field">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      </div>
    </div>
  </div>

  <!-- チャットログ入力 -->
  <div class="section">
    <label>チャットログ</label>
    <textarea id="chatLog" placeholder="Zoom/Teams/Slackのチャットログをここにペースト..."></textarea>
  </div>

  <!-- モード選択と実行 -->
  <div class="section">
    <label>処理モード</label>
    <div class="mode-group">
      <button class="btn active" data-mode="minutes" id="btnMinutes">議事録整形</button>
      <button class="btn btn-outline" data-mode="decisions" id="btnDecisions">決定事項抽出</button>
      <button class="btn btn-outline" data-mode="todos" id="btnTodos">TODO抽出</button>
    </div>
  </div>

  <!-- 実行ボタン -->
  <div class="section">
    <button class="btn" id="btnRun" style="width: 100%;">実行</button>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>処理中...</span>
    </div>
    <div class="error" id="error"></div>
  </div>

  <!-- 結果 -->
  <div class="section">
    <label>結果</label>
    <div class="result-wrapper">
      <div class="result-area" id="result"></div>
      <button class="btn btn-outline copy-btn" id="btnCopy">コピー</button>
    </div>
  </div>
</div>

<!-- コピー通知 -->
<div class="toast" id="toast">コピーしました</div>

<script>
  // 各モードに対応するシステムプロンプト
  const SYSTEM_PROMPTS = {
    minutes: `あなたは議事録整形の専門家です。チャットログを以下の形式の議事録に整形してください。

日付・参加者（推測）・議題・議論内容・決定事項・次回アクションを構造化して出力してください。
箇条書きと段落を適切に使い分け、読みやすい議事録にしてください。`,

    decisions: `あなたは議事録分析の専門家です。チャットログから決定事項のみを抽出してください。

各決定事項について以下を含めてください:
- 決定内容
- 決定者（判別可能な場合）
- 関連する背景や条件

箇条書きで簡潔にまとめてください。`,

    todos: `あなたは議事録分析の専門家です。チャットログからTODO・アクションアイテムを抽出してください。

各TODOについて以下を含めてください:
- タスク内容
- 担当者（判別可能な場合）
- 期限（言及がある場合）
- 優先度（推測）

表形式または箇条書きで出力してください。`
  };

  let currentMode = 'minutes';

  // モード切替
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-mode]').forEach(b => {
        b.classList.remove('active');
        b.classList.add('btn-outline');
      });
      btn.classList.add('active');
      btn.classList.remove('btn-outline');
      currentMode = btn.dataset.mode;
    });
  });

  // 実行
  document.getElementById('btnRun').addEventListener('click', async () => {
    const apiKey = document.getElementById('apiKey').value.trim();
    const chatLog = document.getElementById('chatLog').value.trim();
    const resultEl = document.getElementById('result');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    // バリデーション
    errorEl.classList.remove('show');
    if (!apiKey) {
      errorEl.textContent = 'APIキーを入力してください';
      errorEl.classList.add('show');
      return;
    }
    if (!chatLog) {
      errorEl.textContent = 'チャットログを入力してください';
      errorEl.classList.add('show');
      return;
    }

    // ローディング表示
    loadingEl.classList.add('show');
    resultEl.textContent = '';
    document.getElementById('btnRun').disabled = true;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4096,
          system: SYSTEM_PROMPTS[currentMode],
          messages: [
            {
              role: 'user',
              content: chatLog
            }
          ]
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data.content
        .filter(block => block.type === 'text')
        .map(block => block.text)
        .join('\n');

      resultEl.textContent = text;
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('show');
    } finally {
      loadingEl.classList.remove('show');
      document.getElementById('btnRun').disabled = false;
    }
  });

  // コピー
  document.getElementById('btnCopy').addEventListener('click', () => {
    const text = document.getElementById('result').textContent;
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    });
  });
</script>
</body>
</html>
