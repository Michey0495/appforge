<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード生成・強度チェック</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f3f4f6;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-subtitle { font-size: 11px; color: #9ca3af; }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    border: 1px solid #e5e7eb;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    border-radius: 2px;
    color: #1a1a2e;
    background: #ffffff;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #1e3461; }

  .section { margin-bottom: 32px; }

  .btn {
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #2e4f87; }

  .btn-outline {
    background: transparent;
    color: #1e3461;
    border: 1px solid #e5e7eb;
  }
  .btn-outline:hover { background: #f3f4f6; }

  .strength-meter {
    margin-top: 12px;
  }
  .strength-bar-track {
    width: 100%;
    height: 4px;
    background: #f3f4f6;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .strength-bar-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
    border-radius: 2px;
  }

  .strength-0 { background: #c4b5a0; width: 10%; }
  .strength-1 { background: #8b9ab5; width: 30%; }
  .strength-2 { background: #5a7aaa; width: 50%; }
  .strength-3 { background: #3a5f8a; width: 75%; }
  .strength-4 { background: #1e3461; width: 100%; }

  .strength-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .strength-label {
    font-size: 12px;
    color: #6b7280;
  }
  .strength-value {
    font-size: 12px;
    color: #1a1a2e;
    font-weight: 500;
  }

  .warning-msg {
    margin-top: 8px;
    padding: 8px 12px;
    background: #fffbeb;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    font-size: 12px;
    color: #92400e;
    display: none;
  }
  .warning-msg.show { display: block; }

  .suggestions {
    margin-top: 4px;
    font-size: 11px;
    color: #6b7280;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
    padding: 12px;
    border: 1px solid #f3f4f6;
    border-radius: 2px;
    background: #fafafa;
  }
  .detail-item {
    font-size: 12px;
    color: #6b7280;
  }
  .detail-item span {
    color: #1a1a2e;
    font-weight: 500;
  }

  .gen-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: #e5e7eb;
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 2px;
    background: #1e3461;
    cursor: pointer;
  }
  .slider-value {
    min-width: 28px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
  }

  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #1a1a2e;
    text-transform: none;
    letter-spacing: normal;
    cursor: pointer;
    margin-bottom: 0;
  }
  .checkbox-group input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: #1e3461;
  }

  .generated-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 16px;
  }
  .generated-row input {
    flex: 1;
  }

  .entropy-display {
    margin-top: 8px;
    font-size: 12px;
    color: #6b7280;
  }

  .divider {
    border: none;
    border-top: 1px solid #f3f4f6;
    margin: 32px 0;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e3461;
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .password-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .password-input-row input { flex: 1; }
  .toggle-vis {
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 11px;
    color: #6b7280;
    font-family: inherit;
  }
  .toggle-vis:hover { background: #f3f4f6; }

  .history-section {
    margin-top: 16px;
  }
  .history-list {
    border: 1px solid #f3f4f6;
    border-radius: 2px;
    max-height: 160px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    border-bottom: 1px solid #f3f4f6;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: #fafafa; }
  .history-copy {
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 2px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 10px;
    color: #6b7280;
    font-family: inherit;
    flex-shrink: 0;
  }
  .history-copy:hover { background: #f3f4f6; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="header-title">パスワード生成・強度チェック</span>
    <span class="header-subtitle">Password Strength Analyzer</span>
  </div>

  <!-- 強度チェックセクション -->
  <div class="section">
    <label>パスワード強度チェック</label>
    <div class="password-input-row">
      <input type="password" id="passwordCheck" placeholder="パスワードを入力して強度を確認...">
      <button class="toggle-vis" id="toggleVis">表示</button>
    </div>

    <div class="strength-meter" id="strengthMeter">
      <div class="strength-bar-track">
        <div class="strength-bar-fill" id="strengthBar"></div>
      </div>
      <div class="strength-info">
        <div>
          <span class="strength-label">強度</span>
          <div class="strength-value" id="strengthText">---</div>
        </div>
        <div>
          <span class="strength-label">推定クラック時間</span>
          <div class="strength-value" id="crackTime">---</div>
        </div>
      </div>
    </div>

    <div class="detail-grid" id="detailGrid" style="display:none;">
      <div class="detail-item">エントロピー: <span id="detailEntropy">---</span></div>
      <div class="detail-item">文字数: <span id="detailLength">---</span></div>
      <div class="detail-item">文字種: <span id="detailCharsets">---</span></div>
      <div class="detail-item">推測パターン: <span id="detailPattern">---</span></div>
    </div>

    <div class="warning-msg" id="warningMsg"></div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <hr class="divider">

  <!-- パスワード生成セクション -->
  <div class="section">
    <label>パスワード生成</label>
    <div class="gen-controls">
      <div>
        <label>文字数</label>
        <div class="slider-row">
          <input type="range" id="lengthSlider" min="4" max="128" value="16">
          <span class="slider-value" id="lengthValue">16</span>
        </div>
      </div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="optUpper" checked> 大文字 (A-Z)</label>
        <label><input type="checkbox" id="optLower" checked> 小文字 (a-z)</label>
        <label><input type="checkbox" id="optDigits" checked> 数字 (0-9)</label>
        <label><input type="checkbox" id="optSymbols" checked> 記号 (!@#$...)</label>
        <label><input type="checkbox" id="optExcludeAmbiguous"> 紛らわしい文字を除外 (0Ol1I)</label>
      </div>
    </div>

    <div class="generated-row">
      <input type="text" id="generatedPassword" readonly placeholder="生成ボタンを押してください">
      <button class="btn" id="btnGenerate">生成</button>
      <button class="btn btn-outline" id="btnCopy">コピー</button>
    </div>

    <div class="entropy-display" id="entropyDisplay"></div>

    <!-- 生成履歴 -->
    <div class="history-section">
      <label>生成履歴（最新5件）</label>
      <div class="history-list" id="historyList">
        <div style="padding:12px; color:#9ca3af; text-align:center; font-size:12px;">まだ生成されていません</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
  var STRENGTH_LABELS = ['脆弱', 'やや弱い', '普通', '強い', '堅牢'];
  var passwordHistory = [];

  var passwordInput = document.getElementById('passwordCheck');
  var strengthBar = document.getElementById('strengthBar');
  var strengthText = document.getElementById('strengthText');
  var crackTimeEl = document.getElementById('crackTime');
  var warningEl = document.getElementById('warningMsg');
  var suggestionsEl = document.getElementById('suggestions');
  var detailGrid = document.getElementById('detailGrid');

  // 表示/非表示トグル
  document.getElementById('toggleVis').addEventListener('click', function() {
    var input = passwordInput;
    var btn = document.getElementById('toggleVis');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '非表示';
    } else {
      input.type = 'password';
      btn.textContent = '表示';
    }
  });

  // リアルタイム強度チェック
  passwordInput.addEventListener('input', function() {
    var password = passwordInput.value;

    if (!password) {
      strengthBar.className = 'strength-bar-fill';
      strengthText.textContent = '---';
      crackTimeEl.textContent = '---';
      warningEl.classList.remove('show');
      suggestionsEl.textContent = '';
      detailGrid.style.display = 'none';
      return;
    }

    // zxcvbnのロード待ち
    if (typeof zxcvbn === 'undefined') {
      strengthText.textContent = '読み込み中...';
      return;
    }

    var result = zxcvbn(password);
    var score = result.score;

    // 強度バー更新
    strengthBar.className = 'strength-bar-fill strength-' + score;
    strengthText.textContent = STRENGTH_LABELS[score];
    crackTimeEl.textContent = result.crack_times_display.offline_slow_hashing_1e4_per_second;

    // 詳細情報
    detailGrid.style.display = 'grid';
    document.getElementById('detailLength').textContent = password.length;
    document.getElementById('detailEntropy').textContent = result.guesses_log10 ? (result.guesses_log10 * 3.32).toFixed(1) + ' bits' : '---';

    // 文字種判定
    var charsets = [];
    if (/[a-z]/.test(password)) charsets.push('小文字');
    if (/[A-Z]/.test(password)) charsets.push('大文字');
    if (/[0-9]/.test(password)) charsets.push('数字');
    if (/[^a-zA-Z0-9]/.test(password)) charsets.push('記号');
    document.getElementById('detailCharsets').textContent = charsets.join(', ') || '---';

    // 推測パターン
    var patterns = result.sequence.map(function(s) { return s.pattern; });
    var uniquePatterns = patterns.filter(function(v, i, a) { return a.indexOf(v) === i; });
    document.getElementById('detailPattern').textContent = uniquePatterns.join(', ') || 'なし';

    // 警告表示
    if (result.feedback.warning) {
      warningEl.textContent = result.feedback.warning;
      warningEl.classList.add('show');
    } else {
      warningEl.classList.remove('show');
    }

    // 改善提案
    if (result.feedback.suggestions.length > 0) {
      suggestionsEl.textContent = result.feedback.suggestions.join(' ');
    } else {
      suggestionsEl.textContent = '';
    }
  });

  // スライダー値表示
  var lengthSlider = document.getElementById('lengthSlider');
  var lengthValue = document.getElementById('lengthValue');
  lengthSlider.addEventListener('input', function() {
    lengthValue.textContent = lengthSlider.value;
  });

  // パスワード生成
  document.getElementById('btnGenerate').addEventListener('click', generatePassword);

  function generatePassword() {
    var length = parseInt(lengthSlider.value);
    var useUpper = document.getElementById('optUpper').checked;
    var useLower = document.getElementById('optLower').checked;
    var useDigits = document.getElementById('optDigits').checked;
    var useSymbols = document.getElementById('optSymbols').checked;
    var excludeAmbiguous = document.getElementById('optExcludeAmbiguous').checked;

    var upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var lower = 'abcdefghijklmnopqrstuvwxyz';
    var digits = '0123456789';
    var symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    if (excludeAmbiguous) {
      upper = upper.replace(/[OI]/g, '');
      lower = lower.replace(/[ol]/g, '');
      digits = digits.replace(/[01]/g, '');
    }

    var charset = '';
    var required = [];
    if (useUpper) { charset += upper; required.push(upper); }
    if (useLower) { charset += lower; required.push(lower); }
    if (useDigits) { charset += digits; required.push(digits); }
    if (useSymbols) { charset += symbols; required.push(symbols); }

    if (charset.length === 0) {
      document.getElementById('generatedPassword').value = '';
      document.getElementById('entropyDisplay').textContent = 'オプションを1つ以上選択してください';
      return;
    }

    // 各文字種から最低1文字を保証
    var password = '';
    var array = new Uint32Array(length);
    crypto.getRandomValues(array);

    // 先に各文字種から1文字ずつ確保
    var guaranteedChars = [];
    for (var r = 0; r < required.length && r < length; r++) {
      var rndArr = new Uint32Array(1);
      crypto.getRandomValues(rndArr);
      guaranteedChars.push(required[r][rndArr[0] % required[r].length]);
    }

    // 残りをランダム生成
    var remaining = length - guaranteedChars.length;
    var restChars = [];
    for (var i = 0; i < remaining; i++) {
      restChars.push(charset[array[i] % charset.length]);
    }

    // 結合してシャッフル
    var allChars = guaranteedChars.concat(restChars);
    // Fisher-Yates シャッフル
    var shuffleArr = new Uint32Array(allChars.length);
    crypto.getRandomValues(shuffleArr);
    for (var j = allChars.length - 1; j > 0; j--) {
      var k = shuffleArr[j] % (j + 1);
      var temp = allChars[j];
      allChars[j] = allChars[k];
      allChars[k] = temp;
    }

    password = allChars.join('');
    document.getElementById('generatedPassword').value = password;

    // エントロピー計算
    var entropy = Math.log2(Math.pow(charset.length, length));
    document.getElementById('entropyDisplay').textContent =
      'エントロピー: ' + entropy.toFixed(1) + ' bits / 文字種: ' + charset.length + ' / 文字数: ' + length;

    // 生成したパスワードの強度も自動チェック
    passwordInput.value = password;
    passwordInput.type = 'text';
    document.getElementById('toggleVis').textContent = '非表示';
    passwordInput.dispatchEvent(new Event('input'));

    // 履歴に追加
    addToHistory(password);
  }

  // 生成履歴
  function addToHistory(pw) {
    passwordHistory.unshift(pw);
    if (passwordHistory.length > 5) passwordHistory.pop();
    renderHistory();
  }

  function renderHistory() {
    var list = document.getElementById('historyList');
    if (passwordHistory.length === 0) {
      list.innerHTML = '<div style="padding:12px; color:#9ca3af; text-align:center; font-size:12px;">まだ生成されていません</div>';
      return;
    }
    list.innerHTML = passwordHistory.map(function(pw) {
      // パスワードの一部をマスク表示
      var masked = pw.length > 8 ? pw.slice(0, 4) + '****' + pw.slice(-4) : pw;
      return '<div class="history-item"><span title="' + escapeAttr(pw) + '">' + escapeHtml(masked) + '</span><button class="history-copy" data-pw="' + escapeAttr(pw) + '">コピー</button></div>';
    }).join('');

    list.querySelectorAll('.history-copy').forEach(function(btn) {
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(btn.dataset.pw).then(function() {
          showToast('コピーしました');
        });
      });
    });
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // コピー
  document.getElementById('btnCopy').addEventListener('click', function() {
    var password = document.getElementById('generatedPassword').value;
    if (!password) return;

    navigator.clipboard.writeText(password).then(function() {
      showToast('コピーしました');
    });
  });

  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1500);
  }

  // 初期生成
  generatePassword();
</script>
</body>
</html>
